[celestial]
orbit_distance = 1.5e11 ; meters
base_radius = 6200000 ; meters
outer_radius = 6300000 ; TODO: compute this value instead
mass = 6e24 ; kg ; TODO: compute this value instead
gravity_acceleration = 9.8 ; m/s2 ; TODO: compute this value instead
orbital_plane_tilt = 0 ; degrees
orbit_offset = 0 ; degrees
axial_tilt = 0 ; degrees
rotation_period = 86400 ; seconds

[terrain]
height_variation = 15000 ; meters
module = G4D_celestial ; comment this line to use default terrain generation algo (same as G4D_celestial)

[atmosphere]
density_at_surface = 1.225 ; kg/m3
mie_scattering_coefficient = 0.000001
g = -0.7
temperature_at_surface = 290 ; kelvin ; TODO: compute this value instead

[atmosphere_composition]
; By mole fractions, given arbitrary number of molecules they will be automatically re-normalized to 100% by the engine
N = 78.08
O2 = 20.95
Ar = 0.93
CO2 = 0.03
H2O = 0.01
